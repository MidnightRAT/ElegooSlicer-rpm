name: Build ElegooSlicer RPM

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Run weekly to check for new releases
    - cron: '0 0 * * 0'

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: registry.fedoraproject.org/fedora:44

    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          dnf install -y \
            rpm-build rpmdevtools wget file fuse-libs

      - name: Get latest release version
        id: version
        run: |
          # Get latest release tag from GitHub API (strip 'v' prefix)
          LATEST=$(curl -s https://api.github.com/repos/ELEGOO-3D/ElegooSlicer/releases/latest | grep '"tag_name"' | cut -d '"' -f 4 | sed 's/^v//')
          echo "version=${LATEST}" >> $GITHUB_OUTPUT
          echo "Latest version: ${LATEST}"

      - name: Download AppImage
        run: |
          VERSION=${{ steps.version.outputs.version }}
          # Download AppImage from release
          wget -q "https://github.com/ELEGOO-3D/ElegooSlicer/releases/download/v${VERSION}/ElegooSlicer_Linux_Ubuntu2404_V${VERSION}.AppImage" \
            -O elegoo-slicer.AppImage
          chmod +x elegoo-slicer.AppImage

      - name: Extract AppImage
        run: |
          # Extract AppImage contents
          ./elegoo-slicer.AppImage --appimage-extract
          # Rename extracted directory
          mv squashfs-root elegoo-slicer-extracted

      - name: Prepare RPM build tree
        run: |
          VERSION=${{ steps.version.outputs.version }}
          rpmdev-setuptree

          # Create source tarball from extracted AppImage
          tar czf ~/rpmbuild/SOURCES/elegoo-slicer-${VERSION}.tar.gz elegoo-slicer-extracted/

      - name: Update spec file with version
        run: |
          VERSION=${{ steps.version.outputs.version }}
          # Create spec file from template with correct version
          sed -e "s/@VERSION@/${VERSION}/g" \
              -e "s/@RELEASE@/1/g" \
              elegoo-slicer.spec > ~/rpmbuild/SPECS/elegoo-slicer.spec

      - name: Build RPM and SRPM
        run: |
          cd ~/rpmbuild
          rpmbuild -ba SPECS/elegoo-slicer.spec

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: elegoo-slicer-rpm
          path: |
            ~/rpmbuild/RPMS/x86_64/*.rpm
            ~/rpmbuild/SRPMS/*.rpm
          retention-days: 30
